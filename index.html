<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bharat-P2P · Chaupal (Mesh + Identity)</title>

<!-- PeerJS CDN (Zero‑Backend WebRTC) -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
  /* ──────────────────────────────────────────────
     DESIGN: "Kesari Minimalist" — saffron warmth,
     ink‑dark text, aged‑paper surface, raw grid.
     ────────────────────────────────────────────── */
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --saffron:   #FF6B00;
    --saffron-lt:#FF8C38;
    --saffron-bg:#FFF3E8;
    --ink:       #1A1208;
    --ink-soft:  #4A3728;
    --paper:     #FDFAF5;
    --paper-dark:#F5EFE3;
    --green:     #2A6B3C;
    --green-lt:  #3A8F52;
    --red:       #C0392B;
    --border:    #D9C9B0;
    --shadow:    rgba(26,18,8,0.12);
    --radius:    12px;
    --mono:      'JetBrains Mono', monospace;
    --display:   'Baloo 2', cursive;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--display);
    font-size: 15px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    height: 100dvh;
    max-width: 680px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    background: var(--paper);
    position: relative;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 14px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-bottom: 3px solid var(--saffron);
    position: relative;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .logo {
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--paper);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .logo span { color: var(--saffron); }

  #status-badge {
    font-family: var(--mono);
    font-size: 0.68rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: background 0.3s, color 0.3s;
  }
  .status--loading  { background: #444; color: #aaa; }
  .status--waiting  { background: #7a5f00; color: #FFD77A; }
  .status--connecting { background: #1a4a6b; color: #7FC8FF; }
  .status--connected{ background: #1a4a1a; color: #7FE07F; }
  .status--error    { background: #4a1a1a; color: #FF9E9E; }

  .peer-info {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .peer-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  #my-peer-id {
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--saffron-lt);
    background: rgba(255,107,0,0.12);
    padding: 2px 8px;
    border-radius: 6px;
    word-break: break-all;
    cursor: pointer;
    transition: background 0.2s;
    flex: 1;
    min-width: 0;
  }
  #my-peer-id:hover { background: rgba(255,107,0,0.25); }

  #copy-id-btn {
    background: none;
    border: 1px solid #555;
    color: #ccc;
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #copy-id-btn:hover { border-color: var(--saffron); color: var(--saffron); }

  /* ── CONNECT BAR ── */
  #connect-bar {
    background: var(--paper-dark);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  #remote-id-input {
    flex: 1;
    min-width: 160px;
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 10px 12px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  #remote-id-input:focus { border-color: var(--saffron); }
  #remote-id-input::placeholder { color: #bbb; }

  .btn {
    font-family: var(--display);
    font-weight: 700;
    font-size: 0.88rem;
    padding: 10px 16px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--saffron);
    color: white;
  }
  .btn-primary:hover { background: var(--saffron-lt); }

  .btn-dark {
    background: var(--ink);
    color: var(--paper);
  }
  .btn-dark:hover { background: #2e1e0e; }

  .btn-green {
    background: var(--green);
    color: white;
  }
  .btn-green:hover { background: var(--green-lt); }

  .btn-sm {
    font-size: 0.72rem;
    padding: 4px 9px;
    border-radius: 7px;
    font-weight: 600;
  }

  #invite-btn {
    flex-shrink: 0;
  }

  /* ── REPLY PREVIEW BAR ── */
  #reply-preview {
    background: var(--paper-dark);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  #reply-preview.active { display: flex; }
  .reply-preview-content {
    flex: 1;
    font-size: 0.8rem;
    padding: 5px 10px;
    background: rgba(255,107,0,0.08);
    border-left: 4px solid var(--saffron);
    border-radius: 6px;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .reply-cancel {
    background: none;
    border: none;
    font-size: 1.4rem;
    line-height: 1;
    cursor: pointer;
    color: var(--ink-soft);
    padding: 0 4px;
  }

  /* ── MESSAGES AREA ── */
  #messages {
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
    background:
      radial-gradient(ellipse at top right, rgba(255,107,0,0.04) 0%, transparent 60%),
      var(--paper);
  }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── EMPTY STATE ── */
  #empty-state {
    margin: auto;
    text-align: center;
    opacity: 0.5;
    pointer-events: none;
    padding: 24px;
  }
  #empty-state .es-icon { font-size: 3rem; display: block; margin-bottom: 8px; }
  #empty-state p { font-size: 0.9rem; color: var(--ink-soft); }

  /* ── MESSAGE BUBBLE ── */
  .msg-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: fadeUp 0.25s ease-out;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-wrapper.outgoing { align-self: flex-end; align-items: flex-end; }
  .msg-wrapper.incoming { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.55;
    word-break: break-word;
    position: relative;
    box-shadow: 0 1px 4px var(--shadow);
  }

  .outgoing .bubble {
    background: var(--saffron);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .incoming .bubble {
    background: var(--paper-dark);
    color: var(--ink);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .bubble.permanent {
    outline: 2px solid var(--green);
    outline-offset: 2px;
  }

  /* Sender name */
  .msg-sender {
    font-size: 0.7rem;
    font-weight: 600;
    margin-bottom: 2px;
    opacity: 0.8;
  }
  .outgoing .msg-sender { color: #fff8e7; }
  .incoming .msg-sender { color: var(--ink-soft); }

  /* Reply quote inside bubble */
  .reply-quote {
    background: rgba(0,0,0,0.06);
    padding: 6px 8px;
    margin-bottom: 8px;
    border-left: 4px solid var(--saffron);
    border-radius: 6px;
    font-size: 0.8rem;
    color: var(--ink-soft);
    word-break: break-word;
  }
  .outgoing .reply-quote {
    background: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
  }

  /* Message footer */
  .msg-footer {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    padding: 0 4px;
  }

  .msg-time {
    font-family: var(--mono);
    font-size: 0.63rem;
    color: #999;
  }

  .reply-btn, .edit-btn {
    background: none;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    padding: 2px 4px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .reply-btn:hover, .edit-btn:hover { opacity: 1; }

  .save-btn {
    font-family: var(--mono);
    font-size: 0.62rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .save-btn:not(.saved) {
    background: rgba(42,107,60,0.1);
    color: var(--green);
    border-color: rgba(42,107,60,0.3);
  }
  .save-btn:not(.saved):hover {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }
  .save-btn.saved {
    background: rgba(42,107,60,0.15);
    color: var(--green);
    border-color: transparent;
    cursor: default;
  }

  .permanent-badge {
    font-size: 0.6rem;
    background: var(--green);
    color: white;
    padding: 1px 5px;
    border-radius: 4px;
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* ── SYSTEM MESSAGE ── */
  .sys-msg {
    text-align: center;
    font-size: 0.72rem;
    font-family: var(--mono);
    color: #999;
    padding: 4px 0;
    position: relative;
  }
  .sys-msg::before, .sys-msg::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }
  .sys-msg::before { left: 0; }
  .sys-msg::after  { right: 0; }

  /* ── INPUT AREA ── */
  footer {
    background: var(--paper-dark);
    border-top: 2px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #msg-input {
    flex: 1;
    font-family: var(--display);
    font-size: 0.92rem;
    padding: 11px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 44px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #msg-input:focus { border-color: var(--saffron); }
  #msg-input::placeholder { color: #bbb; }
  #msg-input:disabled { opacity: 0.5; cursor: not-allowed; }

  #send-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    flex-shrink: 0;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  #peer-count-badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    background: rgba(255,255,255,0.15);
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: 8px;
    white-space: nowrap;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 0.78rem;
    padding: 8px 18px;
    border-radius: 100px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 1000;
    border: 1px solid rgba(255,107,0,0.4);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── MODAL (Invite) ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #modal-overlay.active { display: flex; }

  #modal {
    background: var(--paper);
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 380px;
    width: calc(100% - 40px);
    border: 2px solid var(--saffron);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: modalIn 0.2s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title {
    font-size: 1.15rem;
    font-weight: 800;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .modal-sub {
    font-size: 0.8rem;
    color: var(--ink-soft);
    margin-bottom: 16px;
  }

  #invite-link-box {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 10px 12px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper-dark);
    color: var(--ink-soft);
    word-break: break-all;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ── NAME PROMPT (simple) ── */
  #name-prompt-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  #name-prompt {
    background: var(--paper);
    padding: 24px;
    border-radius: 20px;
    border: 2px solid var(--saffron);
    max-width: 340px;
    width: 90%;
    text-align: center;
  }
  #name-prompt h3 { margin-bottom: 16px; color: var(--ink); }
  #display-name-input {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
  }

  @media (max-width: 480px) {
    header { padding: 12px 14px 10px; }
    #connect-bar { padding: 10px 12px; }
    #messages { padding: 12px; }
    footer { padding: 10px 12px; }
    .msg-wrapper { max-width: 92%; }
    .btn { padding: 10px 12px; font-size: 0.82rem; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="header-top">
      <div class="logo">🇮🇳 <span>Bharat</span>-P2P</div>
      <div style="display: flex; align-items: center;">
        <div id="status-badge" class="status--loading">Generating ID…</div>
        <span id="peer-count-badge">👥 0 peers</span>
      </div>
    </div>
    <div class="peer-info">
      <span class="peer-label">Your ID:</span>
      <span id="my-peer-id" title="Click to copy" onclick="copyMyId()">—</span>
      <button id="copy-id-btn" onclick="copyMyId()">Copy</button>
    </div>
  </header>

  <!-- ── CONNECT BAR ── -->
  <div id="connect-bar">
    <input id="remote-id-input" type="text" placeholder="Paste friend's Peer ID…" autocomplete="off" autocapitalize="off" spellcheck="false" />
    <button class="btn btn-primary" onclick="connectToPeer()">Connect</button>
    <button class="btn btn-dark" id="invite-btn" onclick="openInviteModal()">🔗 Invite</button>
  </div>

  <!-- ── REPLY PREVIEW ── -->
  <div id="reply-preview">
    <div class="reply-preview-content" id="reply-preview-text">Replying to ...</div>
    <button class="reply-cancel" onclick="cancelReply()">&times;</button>
  </div>

  <!-- ── MESSAGES ── -->
  <div id="messages">
    <div id="empty-state">
      <span class="es-icon">💬</span>
      <p>No messages yet.<br/>Connect to a peer and start chatting.</p>
    </div>
  </div>

  <!-- ── FOOTER INPUT ── -->
  <footer>
    <textarea id="msg-input" placeholder="Type a message… (Enter to send)" rows="1" disabled oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="btn btn-primary" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
  </footer>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── INVITE MODAL ── -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-title">📎 Invite Link</div>
    <div class="modal-sub">Share this link. When they open it, chat starts automatically.</div>
    <div id="invite-link-box">—</div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="copyInviteLink()">📋 Copy Link</button>
      <button class="btn btn-dark" onclick="closeModalDirect()">Close</button>
    </div>
  </div>
</div>

<!-- Simple name prompt (shown only if no name) -->
<div id="name-prompt-overlay" style="display: none;">
  <div id="name-prompt">
    <h3>👤 Your Display Name</h3>
    <input type="text" id="display-name-input" placeholder="e.g., Kesari" maxlength="20" autocomplete="off" />
    <button class="btn btn-primary" style="width:100%;" onclick="saveDisplayName()">Continue</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   BHARAT‑P2P · CHAUPAL — Mesh P2P with Identity, Auto‑Reconnect,
   Heartbeat, Message Forwarding & Editing. 100% P2P, no server.
   ═══════════════════════════════════════════════════════════════ */

const STORAGE_KEY     = 'bharatp2p_messages';
const PEER_ID_KEY     = 'bharat_peer_id';
const DISPLAY_NAME_KEY= 'bharat_display_name';
const MAX_AGE_MS      = 24 * 60 * 60 * 1000;  // 24h
const HEARTBEAT_INTERVAL = 15000;             // 15 sec
const RECONNECT_DELAY    = 3000;              // 3 sec

// Global state
let peer          = null;
let connections   = [];                // Array of active Peer connections
let myId          = null;
let displayName   = '';

// Reply state
let replyingTo    = null;              // { id, text, direction }

// Message deduplication (prevent forwarding loops)
const seenMessageIds = new Set();
const MAX_SEEN_IDS   = 200;

// Pending reconnects
const reconnectAttempts = new Map();   // peerId -> { count, timer }

// DOM refs
const $status      = document.getElementById('status-badge');
const $peerCount   = document.getElementById('peer-count-badge');
const $myPeerId    = document.getElementById('my-peer-id');
const $remoteIn    = document.getElementById('remote-id-input');
const $msgInput    = document.getElementById('msg-input');
const $messages    = document.getElementById('messages');
const $emptyState  = document.getElementById('empty-state');
const $replyPreview= document.getElementById('reply-preview');
const $replyText   = document.getElementById('reply-preview-text');

/* ═══════════════════════════════════════════════════════════════
   0. IDENTITY SETUP (persistent Peer ID + Display Name)
   ═══════════════════════════════════════════════════════════════ */
function ensureDisplayName() {
  const saved = localStorage.getItem(DISPLAY_NAME_KEY);
  if (saved) {
    displayName = saved;
    return true;
  }
  // Show prompt
  document.getElementById('name-prompt-overlay').style.display = 'flex';
  document.getElementById('display-name-input').focus();
  return false;
}

window.saveDisplayName = function() {
  const input = document.getElementById('display-name-input');
  const name = input.value.trim();
  if (!name) {
    showToast('Please enter a name');
    return;
  }
  displayName = name;
  localStorage.setItem(DISPLAY_NAME_KEY, name);
  document.getElementById('name-prompt-overlay').style.display = 'none';
  // Now we can initialize Peer
  initPeer();
};

/* ═══════════════════════════════════════════════════════════════
   1. INITIALISE PEER (with persistent ID)
   ═══════════════════════════════════════════════════════════════ */
function initPeer() {
  setStatus('loading', 'Generating ID…');

  const savedPeerId = localStorage.getItem(PEER_ID_KEY);
  const options = {
    debug: 0,
    config: { iceServers: [ { urls: 'stun:stun.l.google.com:19302' } ] }
  };
  if (savedPeerId) options.id = savedPeerId;

  peer = new Peer(options);

  peer.on('open', (id) => {
    myId = id;
    if (!savedPeerId) localStorage.setItem(PEER_ID_KEY, id);
    $myPeerId.textContent = id;
    setStatus('waiting', 'Waiting for Peer…');
    updatePeerCount();

    const hash = window.location.hash.slice(1).trim();
    if (hash && hash !== id) autoConnectFromHash(hash);
  });

  peer.on('connection', (incomingConn) => {
    setupConnection(incomingConn);
    addSysMsg(`📡 Peer joined: ${incomingConn.peer.slice(0,8)}…`);
  });

  peer.on('error', (err) => {
    console.error('PeerJS error:', err);
    const msg = err.type === 'peer-unavailable' ? 'Peer not found'
              : err.type === 'unavailable-id' ? 'ID conflict' : 'Connection error';
    setStatus('error', '✕ Error');
    showToast('⚠️ ' + msg);
  });

  peer.on('disconnected', () => {
    setStatus('waiting', 'Disconnected');
    peer.reconnect();
  });
}

/* ═══════════════════════════════════════════════════════════════
   2. AUTO‑CONNECT FROM URL HASH
   ═══════════════════════════════════════════════════════════════ */
function autoConnectFromHash(remoteId) {
  addSysMsg(`Auto‑connecting to ${remoteId.slice(0,8)}…`);
  setStatus('connecting', '⟳ Connecting…');
  $remoteIn.value = remoteId;
  setTimeout(() => {
    const c = peer.connect(remoteId, { reliable: true, metadata: { via: 'invite' } });
    setupConnection(c);
  }, 400);
}

/* ═══════════════════════════════════════════════════════════════
   3. MANUAL CONNECT
   ═══════════════════════════════════════════════════════════════ */
function connectToPeer() {
  const remoteId = $remoteIn.value.trim();
  if (!remoteId) { showToast('Enter a Peer ID first.'); return; }
  if (!peer || !myId) { showToast('Still initialising…'); return; }
  if (remoteId === myId) { showToast("That's your own ID!"); return; }

  setStatus('connecting', '⟳ Connecting…');
  addSysMsg(`Connecting to ${remoteId.slice(0,8)}…`);
  const c = peer.connect(remoteId, { reliable: true });
  setupConnection(c);
}

/* ═══════════════════════════════════════════════════════════════
   4. SETUP DATA CONNECTION (with heartbeat & reconnect logic)
   ═══════════════════════════════════════════════════════════════ */
function setupConnection(conn) {
  if (connections.some(c => c.peer === conn.peer)) {
    console.warn('Already connected to', conn.peer);
    return;
  }

  connections.push(conn);
  updatePeerCount();

  // Heartbeat interval
  const heartbeatTimer = setInterval(() => {
    if (conn.open) {
      conn.send({ type: 'heartbeat', ts: Date.now() });
    }
  }, HEARTBEAT_INTERVAL);

  conn.heartbeatTimer = heartbeatTimer;

  conn.on('open', () => {
    setStatus('connected', '● Connected!');
    $msgInput.disabled = false;
    $msgInput.focus();
    addSysMsg(`🔒 Secure channel with ${conn.peer.slice(0,8)}…`);
    updatePeerCount();
    // Clear reconnect attempts for this peer
    reconnectAttempts.delete(conn.peer);
  });

  conn.on('data', (data) => {
    if (data.type === 'chat') {
      receiveMessage(data, conn);
    } else if (data.type === 'edit') {
      handleEditMessage(data);
    } else if (data.type === 'heartbeat') {
      // keep alive, nothing else
    }
  });

  conn.on('close', () => {
    handleConnectionClose(conn);
  });

  conn.on('error', (err) => {
    console.warn('Connection error', err);
    handleConnectionClose(conn);
  });
}

function handleConnectionClose(conn) {
  clearInterval(conn.heartbeatTimer);
  connections = connections.filter(c => c !== conn);

  const peerId = conn.peer;
  updatePeerCount();
  addSysMsg(`⚠️ Peer ${peerId.slice(0,8)} disconnected.`);

  if (connections.length === 0) {
    setStatus('waiting', 'Waiting for Peer…');
    $msgInput.disabled = true;
  }

  // Schedule reconnect unless we already have an open connection to that peer
  if (!connections.some(c => c.peer === peerId && c.open)) {
    scheduleReconnect(peerId);
  }
}

function scheduleReconnect(peerId) {
  if (reconnectAttempts.has(peerId)) {
    const entry = reconnectAttempts.get(peerId);
    if (entry.count >= 5) {
      addSysMsg(`❌ Giving up reconnect to ${peerId.slice(0,8)}`);
      reconnectAttempts.delete(peerId);
      return;
    }
    entry.count++;
  } else {
    reconnectAttempts.set(peerId, { count: 1 });
  }

  addSysMsg(`🔄 Reconnecting to ${peerId.slice(0,8)} in 3s…`);
  const timer = setTimeout(() => {
    if (!peer || peer.destroyed) return;
    // Check if already connected
    if (connections.some(c => c.peer === peerId && c.open)) {
      reconnectAttempts.delete(peerId);
      return;
    }
    const c = peer.connect(peerId, { reliable: true });
    setupConnection(c);
    reconnectAttempts.delete(peerId);
  }, RECONNECT_DELAY);

  const entry = reconnectAttempts.get(peerId);
  if (entry) entry.timer = timer;
}

function updatePeerCount() {
  const openCount = connections.filter(c => c.open).length;
  $peerCount.textContent = `👥 ${openCount} peer${openCount !== 1 ? 's' : ''}`;
}

/* ═══════════════════════════════════════════════════════════════
   5. SEND MESSAGE (with reply, edit support)
   ═══════════════════════════════════════════════════════════════ */
let editingMessageId = null;  // if we're editing an existing message

function sendMessage() {
  const text = $msgInput.value.trim();
  if (!text) return;

  // If editing an existing message
  if (editingMessageId) {
    finalizeEdit(editingMessageId, text);
    return;
  }

  if (connections.filter(c => c.open).length === 0) {
    showToast('Not connected to any peer.');
    return;
  }

  const msgObj = {
    type:       'chat',
    id:         crypto.randomUUID(),
    text:       text,
    timestamp:  Date.now(),
    direction:  'outgoing',
    permanent:  false,
    senderId:   myId,
    senderName: displayName,
    replyTo:    replyingTo ? { id: replyingTo.id, text: replyingTo.text, direction: replyingTo.direction } : null
  };

  // Send to all open connections
  connections.forEach(conn => { if (conn.open) conn.send(msgObj); });

  // Also save locally
  saveMessage(msgObj);
  renderMessage(msgObj);

  $msgInput.value = '';
  autoResize($msgInput);
  scrollToBottom();
  cancelReply();

  // Mark as seen to avoid forwarding loops
  seenMessageIds.add(msgObj.id);
  if (seenMessageIds.size > MAX_SEEN_IDS) {
    const iter = seenMessageIds.values();
    for (let i=0; i<50; i++) seenMessageIds.delete(iter.next().value);
  }
}

/* ═══════════════════════════════════════════════════════════════
   6. RECEIVE MESSAGE (with forwarding)
   ═══════════════════════════════════════════════════════════════ */
function receiveMessage(data, sourceConn) {
  // Deduplicate
  if (seenMessageIds.has(data.id)) return;
  seenMessageIds.add(data.id);
  if (seenMessageIds.size > MAX_SEEN_IDS) {
    const iter = seenMessageIds.values();
    for (let i=0; i<50; i++) seenMessageIds.delete(iter.next().value);
  }

  const msgObj = {
    ...data,
    direction: 'incoming'
  };

  saveMessage(msgObj);
  renderMessage(msgObj);
  scrollToBottom();

  // Forward to all other connected peers (mesh broadcast)
  connections.forEach(conn => {
    if (conn !== sourceConn && conn.open) {
      conn.send(data);
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   7. MESSAGE EDITING
   ═══════════════════════════════════════════════════════════════ */
function startEdit(msgId) {
  const messages = loadMessages();
  const msg = messages.find(m => m.id === msgId);
  if (!msg || msg.direction !== 'outgoing') return;

  editingMessageId = msgId;
  $msgInput.value = msg.text;
  $msgInput.focus();
  autoResize($msgInput);
  showToast('✏️ Edit your message and press Enter');
}

function finalizeEdit(msgId, newText) {
  if (!newText.trim()) {
    cancelEdit();
    return;
  }

  const messages = loadMessages();
  const idx = messages.findIndex(m => m.id === msgId);
  if (idx === -1) return;

  messages[idx].text = newText;
  messages[idx].edited = true;
  persistMessages(messages);

  // Update UI
  const bubble = document.querySelector(`.msg-wrapper[data-msg-id="${msgId}"] .bubble`);
  if (bubble) {
    // Rebuild content: keep reply quote if present, update main text
    const msg = messages[idx];
    const quoteHtml = msg.replyTo ? `<div class="reply-quote">↩️ ${escapeHTML(msg.replyTo.text)}</div>` : '';
    bubble.innerHTML = quoteHtml + escapeHTML(msg.text) + (msg.edited ? ' <span style="opacity:0.7; font-size:0.7rem;">(edited)</span>' : '');
  }

  // Broadcast edit to all peers
  const editPacket = {
    type: 'edit',
    messageId: msgId,
    newText: newText,
    senderId: myId
  };
  connections.forEach(conn => { if (conn.open) conn.send(editPacket); });

  cancelEdit();
  showToast('✅ Message updated');
}

function handleEditMessage(packet) {
  const { messageId, newText } = packet;
  const messages = loadMessages();
  const idx = messages.findIndex(m => m.id === messageId);
  if (idx === -1) return;

  messages[idx].text = newText;
  messages[idx].edited = true;
  persistMessages(messages);

  const bubble = document.querySelector(`.msg-wrapper[data-msg-id="${messageId}"] .bubble`);
  if (bubble) {
    const msg = messages[idx];
    const quoteHtml = msg.replyTo ? `<div class="reply-quote">↩️ ${escapeHTML(msg.replyTo.text)}</div>` : '';
    bubble.innerHTML = quoteHtml + escapeHTML(msg.text) + ' <span style="opacity:0.7; font-size:0.7rem;">(edited)</span>';
  }
}

function cancelEdit() {
  editingMessageId = null;
  $msgInput.value = '';
  autoResize($msgInput);
}

/* ═══════════════════════════════════════════════════════════════
   8. RENDER MESSAGE (with sender name, edit button)
   ═══════════════════════════════════════════════════════════════ */
function renderMessage(msg) {
  $emptyState.style.display = 'none';

  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${msg.direction}`;
  wrapper.dataset.msgId = msg.id;

  const timeStr = formatTime(msg.timestamp);
  const isPerm  = msg.permanent;
  const isOwn   = msg.direction === 'outgoing' || msg.senderId === myId;

  // Sender name display (only for incoming, or we can show for all)
  const senderDisplay = (msg.direction === 'incoming' && msg.senderName) 
    ? `<div class="msg-sender">${escapeHTML(msg.senderName)}</div>` 
    : (msg.direction === 'outgoing' ? `<div class="msg-sender">You</div>` : '');

  let quoteHtml = '';
  if (msg.replyTo) {
    quoteHtml = `<div class="reply-quote">↩️ ${escapeHTML(msg.replyTo.text || '')}</div>`;
  }

  const editedMark = msg.edited ? ' <span style="opacity:0.7; font-size:0.7rem;">(edited)</span>' : '';

  wrapper.innerHTML = `
    <div class="bubble ${isPerm ? 'permanent' : ''}" id="bubble-${msg.id}">
      ${senderDisplay}
      ${quoteHtml}
      ${escapeHTML(msg.text)}${editedMark}
    </div>
    <div class="msg-footer">
      <span class="msg-time">${timeStr}</span>
      <button class="reply-btn" onclick="replyToMessage('${msg.id}')" title="Reply">↩️</button>
      ${isOwn ? `<button class="edit-btn" onclick="startEdit('${msg.id}')" title="Edit">✏️</button>` : ''}
      ${isPerm
        ? `<span class="permanent-badge">📌 Saved</span>`
        : `<button class="save-btn" id="savebtn-${msg.id}" onclick="saveForever('${msg.id}')">Save</button>`
      }
    </div>
  `;

  $messages.appendChild(wrapper);
}

/* ═══════════════════════════════════════════════════════════════
   9. REPLY FEATURE
   ═══════════════════════════════════════════════════════════════ */
function replyToMessage(msgId) {
  const messages = loadMessages();
  const msg = messages.find(m => m.id === msgId);
  if (!msg) return;

  replyingTo = { id: msg.id, text: msg.text, direction: msg.direction };
  const preview = (msg.text.length > 50) ? msg.text.slice(0,50)+'…' : msg.text;
  $replyText.textContent = `↩️ Replying to: ${preview}`;
  $replyPreview.classList.add('active');
  $msgInput.focus();
}

function cancelReply() {
  replyingTo = null;
  $replyPreview.classList.remove('active');
  $replyText.textContent = '';
}

/* ═══════════════════════════════════════════════════════════════
   10. SAVE FOREVER (Permanent)
   ═══════════════════════════════════════════════════════════════ */
function saveForever(msgId) {
  const messages = loadMessages();
  const idx = messages.findIndex(m => m.id === msgId);
  if (idx === -1) return;
  messages[idx].permanent = true;
  persistMessages(messages);

  const bubble = document.getElementById(`bubble-${msgId}`);
  const saveBtn = document.getElementById(`savebtn-${msgId}`);
  if (bubble) bubble.classList.add('permanent');
  if (saveBtn) saveBtn.outerHTML = `<span class="permanent-badge">📌 Saved</span>`;
  showToast('💾 Message saved permanently!');
}

/* ═══════════════════════════════════════════════════════════════
   11. LOCALSTORAGE CRUD
   ═══════════════════════════════════════════════════════════════ */
function loadMessages() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function persistMessages(msgs) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs)); }
  catch(e) { console.warn('storage full', e); }
}
function saveMessage(msg) {
  const msgs = loadMessages();
  msgs.push(msg);
  persistMessages(msgs);
}
function pruneOldMessages() {
  const msgs = loadMessages();
  const now = Date.now();
  const kept = msgs.filter(m => m.permanent || (now - m.timestamp) < MAX_AGE_MS);
  persistMessages(kept);
  return kept;
}
function loadAndRenderHistory() {
  const msgs = pruneOldMessages();
  if (msgs.length === 0) return;
  $emptyState.style.display = 'none';
  addSysMsg('— Previous messages (last 24h) —');
  msgs.forEach(m => renderMessage(m));
  scrollToBottom();
}

/* ═══════════════════════════════════════════════════════════════
   12. UTILITIES
   ═══════════════════════════════════════════════════════════════ */
function addSysMsg(text) {
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  $messages.appendChild(el);
  scrollToBottom();
}
function setStatus(type, text) {
  $status.textContent = text;
  $status.className = `status--${type}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function scrollToBottom() { $messages.scrollTop = $messages.scrollHeight; }
function formatTime(ts) {
  const d = new Date(ts);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  const time = d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  return isToday ? time : `${d.getDate()}/${d.getMonth()+1} ${time}`;
}
function escapeHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br/>');
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (editingMessageId) finalizeEdit(editingMessageId, $msgInput.value.trim());
    else sendMessage();
  }
}

/* ── Invite & Copy ── */
function openInviteModal() {
  if (!myId) { showToast('Still generating ID…'); return; }
  const base = location.origin + location.pathname;
  document.getElementById('invite-link-box').textContent = `${base}#${myId}`;
  document.getElementById('modal-overlay').classList.add('active');
}
function copyInviteLink() {
  const link = document.getElementById('invite-link-box').textContent;
  navigator.clipboard?.writeText(link).then(() => { showToast('✅ Link copied!'); closeModalDirect(); })
    .catch(() => showToast('Copy manually'));
}
function closeModal(e) { if (e.target.id === 'modal-overlay') closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('active'); }
function copyMyId() {
  if (!myId) return;
  navigator.clipboard?.writeText(myId).then(() => showToast('📋 ID copied!')).catch(()=>{});
}

/* ═══════════════════════════════════════════════════════════════
   BOOT SEQUENCE
   ═══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  loadAndRenderHistory();

  if (!ensureDisplayName()) {
    // Prompt shown; initPeer will be called after name is saved.
  } else {
    initPeer();
  }

  $remoteIn.addEventListener('keydown', e => { if (e.key==='Enter') connectToPeer(); });
  window.addEventListener('hashchange', () => {
    const hash = location.hash.slice(1).trim();
    if (hash && hash !== myId && myId) autoConnectFromHash(hash);
  });
});
</script>
